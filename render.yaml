services:
  - type: web
    name: nova-call-eval
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false            # set this as a secret in the Render dashboard, never in the repo
      - key: NODE_VERSION
        value: "20"
      # - key: NOVA_JUDGE_MODEL   # optional: override the judge model
      #   value: claude-opus-4-...
